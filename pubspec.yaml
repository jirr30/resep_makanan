name: resep_makanan
description: Aplikasi Resep Makanan Lengkap
publish_to: 'none'
version: 1.2.0+3

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8
